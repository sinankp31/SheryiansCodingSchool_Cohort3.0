<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Art Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="gallerySection">
    <div class="container">
      <div class="sectionHeader">
        <h2>Explore Art Work</h2>
        <a href="#">See All</a>
      </div>

      <div class="galleryGrid">
        <!-- Card 1 -->
        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/monicular.png" alt="Monocular">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Monocular</h3>
              <div class="likes">
                <span>54.8K</span>
                <span>♡</span>
              </div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <!-- Repeat cards -->
        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/hornsMask.png" alt="Horns Mask">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Horns Mask</h3>
              <div class="likes"><span>32.4K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/lightMoon.png" alt="Light Moon">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Light Moon</h3>
              <div class="likes"><span>86.6K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/skullWire.png" alt="Skull Wire">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Skull Wire</h3>
              <div class="likes"><span>78.9K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/spiderMan.png" alt="Spiderman">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Spiderman</h3>
              <div class="likes"><span>24.8K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/deadPool.png" alt="DeadPool">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>DeadPool</h3>
              <div class="likes"><span>59.7K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/whiteEye.png" alt="White Eye">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>White Eye</h3>
              <div class="likes"><span>45.7K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>

        <div class="artCard">
          <div class="artImage">
            <img src="/Assignment03/assets/plasticSkull.png" alt="Plastic Spinal">
          </div>
          <div class="artInfo">
            <div class="artMeta">
              <h3>Plastic Spinal</h3>
              <div class="likes"><span>98.6K</span><span>♡</span></div>
            </div>
            <button class="bidBtn">Place Bid</button>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
